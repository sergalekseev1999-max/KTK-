<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>КТК</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="КТК">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#09090b">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="apple-touch-icon" href="https://img.icons8.com/parakeet/512/shipping-container.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #09090b;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at top, #1e1b4b, #09090b);
      color: #e2e8f0;
      z-index: 10;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(139,92,246,0.3);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    #loading p { font-size: 14px; color: #94a3b8; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Загрузка КТК...</p>
  </div>
  <script>
    // Прямой редирект на GAS — обходит ВСЕ проблемы с кешем iframe на iOS
    var gasUrl = "https://script.google.com/macros/s/AKfycbx-KXBk32hO36fMYV8SjdLF6mazf59prTwVuUSEg6zZ3wexAgrNG1sS_ZcxZ8DbzEYIUw/exec";
    window.location.replace(gasUrl + "?nocache=" + Date.now());
  </script>
</body>
</html>
